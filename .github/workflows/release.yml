name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            asset_glob: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress

      - name: Setup embedded Python runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          PYTHON_VERSION="3.13.13"
          RELEASE_TAG="20260510"
          TARGET_DIR="src-tauri/python-runtime"
          PYTHON_DIR="$TARGET_DIR/python"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE_TAG}/cpython-${PYTHON_VERSION}+${RELEASE_TAG}-aarch64-apple-darwin-install_only.tar.gz"

          # Ensure directory exists so Tauri resource glob always matches
          mkdir -p "$PYTHON_DIR"
          touch "$PYTHON_DIR/.gitkeep"

          if [ -f "$PYTHON_DIR/bin/python3" ]; then
            echo "Python already exists, skipping download."
          else
            echo "Downloading Python $PYTHON_VERSION..."
            curl -fSL -o /tmp/python-build-standalone.tar.gz "$URL"
            echo "Extracting..."
            tar xzf /tmp/python-build-standalone.tar.gz -C "$TARGET_DIR"
            if [ ! -f "$PYTHON_DIR/bin/python3" ]; then
              echo "::error::python3 not found after extraction"
              exit 1
            fi
          fi

          echo "Installing yfinance + orjson..."
          "$PYTHON_DIR/bin/python3" -m pip install --no-warn-script-location yfinance orjson
          echo "Python runtime ready."

      - name: Setup embedded Python runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pythonVersion = "3.13.13"
          $releaseTag = "20260510"
          $targetDir = "src-tauri/python-runtime"
          $pythonDir = "$targetDir/python"
          $url = "https://github.com/astral-sh/python-build-standalone/releases/download/$releaseTag/cpython-$pythonVersion+${releaseTag}-x86_64-pc-windows-msvc-install_only.tar.gz"

          # Ensure directory exists so Tauri resource glob always matches
          New-Item -ItemType Directory -Force -Path $pythonDir | Out-Null
          New-Item -ItemType File -Force -Path "$pythonDir/.gitkeep" | Out-Null

          if (Test-Path "$pythonDir/python.exe") {
            Write-Host "Python already exists, skipping download."
          } else {
            Write-Host "Downloading Python $pythonVersion..."
            curl -fSL -o "$env:TEMP/python-build-standalone.tar.gz" $url
            Write-Host "Extracting..."
            tar xzf "$env:TEMP/python-build-standalone.tar.gz" -C $targetDir
            if (-not (Test-Path "$pythonDir/python.exe")) {
              Write-Error "python.exe not found after extraction"
              exit 1
            }
          }

          Write-Host "Installing yfinance + orjson..."
          & "$pythonDir/python.exe" -m pip install --no-warn-script-location yfinance orjson
          Write-Host "Python runtime ready."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: ${{ matrix.target == 'universal-apple-darwin' && '-C target-feature=-avx512f' || '' }}
        with:
          args: --target ${{ matrix.target }}

      - name: Zip Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exeDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem "$exeDir/*.exe" | Select-Object -First 1
          $zipName = [System.IO.Path]::ChangeExtension($exe.Name, ".zip")
          Compress-Archive -Path $exe.FullName -DestinationPath "$exeDir/$zipName"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
