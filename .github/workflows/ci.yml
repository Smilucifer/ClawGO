name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: |
          if ! npm run lint; then
            echo ""
            echo "::error::ESLint check failed. Run locally to auto-fix:"
            echo "  npx eslint --fix src/"
            exit 1
          fi

      - name: Format check
        run: |
          if ! npm run format:check; then
            echo ""
            echo "::error::Prettier format check failed. Run locally to fix:"
            echo "  npx prettier --write ."
            exit 1
          fi

      - name: i18n check
        run: npm run i18n:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        shell: bash
        run: |
          if ! cargo fmt --manifest-path src-tauri/Cargo.toml --check; then
            echo ""
            echo "::error::Rust format check failed. Run locally to fix:"
            echo "  cargo fmt --manifest-path src-tauri/Cargo.toml"
            exit 1
          fi

      - name: Create frontend build stub
        run: mkdir -p build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-windows:
    name: Build Windows
    if: contains(github.event.pull_request.labels.*.name, 'build-windows') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Install protoc (Windows)
        run: choco install protoc --no-progress

      - name: Setup embedded Python runtime
        shell: pwsh
        run: |
          $pythonVersion = "3.13.13"
          $releaseTag = "20260510"
          $targetDir = "src-tauri/python-runtime"
          $pythonDir = "$targetDir/python"
          $url = "https://github.com/astral-sh/python-build-standalone/releases/download/$releaseTag/cpython-$pythonVersion+${releaseTag}-x86_64-pc-windows-msvc-install_only.tar.gz"

          if (Test-Path "$pythonDir/python.exe") {
            Write-Host "Python already exists, skipping download."
          } else {
            New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
            Write-Host "Downloading Python $pythonVersion..."
            curl -L -o "$env:TEMP/python-build-standalone.tar.gz" $url
            Write-Host "Extracting..."
            tar xzf "$env:TEMP/python-build-standalone.tar.gz" -C $targetDir
            if (-not (Test-Path "$pythonDir/python.exe")) {
              Write-Error "python.exe not found after extraction"
              exit 1
            }
          }

          Write-Host "Installing yfinance + orjson..."
          & "$pythonDir/python.exe" -m pip install --no-warn-script-location yfinance orjson
          Write-Host "Python runtime ready."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Zip Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exeDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem "$exeDir/*.exe" | Select-Object -First 1
          $zipName = [System.IO.Path]::ChangeExtension($exe.Name, ".zip")
          Compress-Archive -Path $exe.FullName -DestinationPath "$exeDir/$zipName"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    if: contains(github.event.pull_request.labels.*.name, 'build-macos') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal-apple-darwin

      - name: Install protoc
        run: brew install protobuf

      - name: Setup embedded Python runtime
        run: |
          PYTHON_VERSION="3.13.13"
          RELEASE_TAG="20260510"
          TARGET_DIR="src-tauri/python-runtime"
          PYTHON_DIR="$TARGET_DIR/python"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE_TAG}/cpython-${PYTHON_VERSION}+${RELEASE_TAG}-aarch64-apple-darwin-install_only.tar.gz"

          if [ -f "$PYTHON_DIR/bin/python3" ]; then
            echo "Python already exists, skipping download."
          else
            mkdir -p "$TARGET_DIR"
            echo "Downloading Python $PYTHON_VERSION..."
            curl -L -o /tmp/python-build-standalone.tar.gz "$URL"
            echo "Extracting..."
            tar xzf /tmp/python-build-standalone.tar.gz -C "$TARGET_DIR"
            if [ ! -f "$PYTHON_DIR/bin/python3" ]; then
              echo "::error::python3 not found after extraction"
              exit 1
            fi
          fi

          echo "Installing yfinance + orjson..."
          "$PYTHON_DIR/bin/python3" -m pip install --no-warn-script-location yfinance orjson
          echo "Python runtime ready."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          RUSTFLAGS: "-C target-feature=-avx512f"
        with:
          args: --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7
